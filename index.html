<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0e1621; color: white; font-family: sans-serif; text-align: center; margin: 0; overflow: hidden; }
        .score { font-size: 50px; font-weight: bold; color: #3498db; margin-top: 40px; }
        .wolf-btn { 
            width: 250px; height: 250px; border-radius: 50%; 
            background: url('1774235761232.png') center/cover;
            border: 6px solid #3498db; margin: 50px auto; 
        }
    </style>
</head>
<body>
    <div class="score">💰 <span id="score">0</span></div>
    <div class="wolf-btn" id="btn"></div>
    <p>Просто закрой окно (нажми X), чтобы сохранить!</p>

    <script>
        let tg = window.Telegram.WebApp;
        let score = parseInt(localStorage.getItem('wolf_score')) || 0;
        tg.expand();
        document.getElementById('score').innerText = score;

        document.getElementById('btn').addEventListener('touchstart', (e) => {
            e.preventDefault();
            score++;
            document.getElementById('score').innerText = score;
            localStorage.setItem('wolf_score', score);
        });

        // САМОЕ ВАЖНОЕ: Отправка при закрытии
        window.addEventListener('beforeunload', () => {
            if (score > 0) {
                tg.sendData(JSON.stringify({clicks: score}));
            }
        });
    </script>
</body>
</html>
