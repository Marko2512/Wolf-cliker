<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            background: radial-gradient(circle, #1b2838 0%, #0e1621 100%); 
            color: white; 
            text-align: center; 
            margin: 0; 
            padding: 0; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            overflow: hidden; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            user-select: none;
        }
        #score-container { margin-top: 40px; }
        #score { font-size: 55px; color: #ffffff; text-shadow: 0 0 20px rgba(100, 181, 246, 0.8); font-weight: 800; }
        .currency { font-size: 24px; color: #64b5f6; margin-left: 10px; }
        
        .game-area { 
            flex-grow: 1; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            position: relative;
        }
        
        /* Контейнер для волка */
        #wolf-container {
            width: 280px;
            height: 280px;
            border-radius: 50%;
            background-image: url('https://raw.githubusercontent.com/Marko2512/Wolf-cliker/main/1774235761232.png?v=fresh');
            background-size: cover;
            background-position: center;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            transition: transform 0.05s cubic-bezier(0.1, 0.7, 1.0, 0.1);
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            z-index: 2;
        }

        /* Запасной вариант, если картинка не грузится */
        #wolf-container:empty::before {
            content: '🐺';
            font-size: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
        }

        #save-btn { 
            background: linear-gradient(135-deg, #26a69a 0%, #00897b 100%); 
            color: white; 
            border: none; 
            padding: 20px; 
            width: 80%; 
            border-radius: 20px; 
            font-size: 22px; 
            margin-bottom: 40px; 
            align-self: center; 
            font-weight: bold; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            cursor: pointer;
        }
        
        #save-btn:active { transform: translateY(2px); box-shadow: 0 2px 5px rgba(0,0,0,0.3); }

        /* Эффект вылетающих цифр */
        .tap-text {
            position: absolute;
            color: #64b5f6;
            font-size: 30px;
            font-weight: bold;
            pointer-events: none;
            animation: moveUp 0.6s ease-out forwards;
            z-index: 3;
        }

        @keyframes moveUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-100px); opacity: 0; }
        }
    </style>
</head>
<body>
    <div id="score-container">
        <span id="score">0</span><span class="currency">WOLF</span>
    </div>
    
    <div class="game-area">
        <div id="wolf-container"></div>
    </div>
    
    <button id="save-btn">СОХРАНИТЬ РЕЗУЛЬТАТ</button>

    <script>
        const tg = window.Telegram.WebApp;
        const scoreDisplay = document.getElementById('score');
        const wolf = document.getElementById('wolf-container');
        const gameArea = document.querySelector('.game-area');
        
        let clicks = parseInt(new URLSearchParams(window.location.search).get('bal')) || 0;
        scoreDisplay.innerText = clicks;

        function handleTap(e) {
            e.preventDefault();
            clicks++;
            scoreDisplay.innerText = clicks;
            
            // Анимация волка
            wolf.style.transform = "scale(0.92)";
            setTimeout(() => { wolf.style.transform = "scale(1)"; }, 50);

            // Создаем вылетающий текст "+1"
            const tapText = document.createElement('div');
            tapText.className = 'tap-text';
            tapText.innerText = '+1';
            
            // Позиция тапа
            const rect = wolf.getBoundingClientRect();
            tapText.style.left = (rect.left + rect.width/2) + 'px';
            tapText.style.top = (rect.top) + 'px';
            
            gameArea.appendChild(tapText);
            setTimeout(() => tapText.remove(), 600);
            
            if (window.navigator.vibrate) window.navigator.vibrate(10);
        }

        wolf.addEventListener('touchstart', handleTap);

        document.getElementById('save-btn').onclick = () => {
            tg.sendData(JSON.stringify({ clicks: clicks }));
            tg.close();
        };

        tg.expand();
        tg.headerColor = '#0e1621';
    </script>
</body>
</html>
