<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0e1621; color: white; font-family: sans-serif; text-align: center; margin: 0; user-select: none; }
        .score-container { font-size: 50px; margin: 20px 0; font-weight: bold; }
        .wolf-btn { 
            width: 250px; height: 250px; border-radius: 50%; 
            background: url('https://i.ibb.co/Xz95mPZ/wolf-icon.png') center/cover;
            border: 6px solid #3498db; box-shadow: 0 0 20px #3498db;
            margin: 40px auto; cursor: pointer; transition: transform 0.05s;
        }
        .wolf-btn:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div style="margin-top:20px; color:#3498db;">WOLF MARKO CLICKER</div>
    <div class="score-container">💰 <span id="score">0</span></div>
    <div class="wolf-btn" id="clickBtn"></div>

    <script>
        let tg = window.Telegram.WebApp;
        let score = parseInt(localStorage.getItem('wolf_score')) || 0;
        tg.expand();

        const scoreEl = document.getElementById('score');
        scoreEl.innerText = score;

        document.getElementById('clickBtn').addEventListener('touchstart', (e) => {
            e.preventDefault();
            score++;
            scoreEl.innerText = score;
            localStorage.setItem('wolf_score', score);
            
            // ОТПРАВКА ДАННЫХ БОТУ (каждые 5 кликов)
            if (score % 5 === 0) {
                tg.sendData(JSON.stringify({clicks: score}));
            }
        });
    </script>
</body>
</html>
