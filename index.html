<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0e1621; color: white; font-family: sans-serif; text-align: center; margin: 0; overflow: hidden; }
        .score { font-size: 50px; font-weight: bold; color: #3498db; margin-top: 30px; }
        .wolf-btn { 
            width: 240px; height: 240px; border-radius: 50%; 
            background: url('1774235761232.png') center/cover;
            border: 6px solid #3498db; margin: 30px auto; 
        }
        #save-btn {
            background: #27ae60; color: white; border: none; padding: 20px;
            width: 80%; font-size: 20px; border-radius: 15px; font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="score">💰 <span id="score">0</span></div>
    <div class="wolf-btn" id="btn"></div>
    <button id="save-btn" onclick="hardClose()">СОХРАНИТЬ И ВЫЙТИ</button>

    <script>
        let tg = window.Telegram.WebApp;
        let score = parseInt(localStorage.getItem('wolf_score')) || 0;
        tg.expand();
        document.getElementById('score').innerText = score;

        document.getElementById('btn').addEventListener('touchstart', (e) => {
            e.preventDefault();
            score++;
            document.getElementById('score').innerText = score;
            localStorage.setItem('wolf_score', score);
        });

        function hardClose() {
            const btn = document.getElementById('save-btn');
            btn.innerText = "ОТПРАВКА...";
            btn.style.background = "#f39c12";

            // Отправляем данные
            tg.sendData(JSON.stringify({clicks: score}));
            
            // Ждем чуть-чуть и закрываем принудительно
            setTimeout(() => {
                tg.close();
            }, 500);
        }
    </script>
</body>
</html>
