<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0e1621; color: white; text-align: center; margin: 0; padding: 0; font-family: sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        #score { font-size: 60px; margin-top: 30px; color: #64b5f6; font-weight: bold; }
        .game { flex-grow: 1; display: flex; align-items: center; justify-content: center; }
        #wolf-btn { width: 280px; height: 280px; cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent; transition: transform 0.05s; }
        #save-btn { background: #4db6ac; color: white; border: none; padding: 18px; width: 85%; border-radius: 15px; font-size: 20px; margin-bottom: 30px; align-self: center; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div id="score">0</div>
    <div class="game">
        <img id="wolf-btn" src="https://raw.githubusercontent.com/Marko2512/Wolf-cliker/main/1774235761232.png" onerror="this.src='https://img.icons8.com/color/250/wolf.png'">
    </div>
    <button id="save-btn">СОХРАНИТЬ МОНЕТЫ</button>

    <script>
        const tg = window.Telegram.WebApp;
        const scoreDisplay = document.getElementById('score');
        const wolf = document.getElementById('wolf-btn');
        
        let clicks = parseInt(new URLSearchParams(window.location.search).get('bal')) || 0;
        scoreDisplay.innerText = clicks;

        function doTap(e) {
            if(e) e.preventDefault();
            clicks++;
            scoreDisplay.innerText = clicks;
            wolf.style.transform = "scale(0.95)";
            setTimeout(() => { wolf.style.transform = "scale(1)"; }, 50);
        }

        wolf.addEventListener('touchstart', doTap);
        wolf.addEventListener('click', doTap);

        document.getElementById('save-btn').onclick = () => {
            tg.sendData(JSON.stringify({ clicks: clicks }));
            tg.close();
        };
        tg.expand();
    </script>
</body>
</html>
