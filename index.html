<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            background: radial-gradient(circle, #1b2838 0%, #0e1621 100%); 
            color: white; text-align: center; margin: 0; padding: 0; 
            font-family: sans-serif; overflow: hidden; height: 100vh; 
            display: flex; flex-direction: column; user-select: none;
        }
        #top-bar { display: flex; justify-content: space-between; padding: 15px 20px; align-items: center; }
        #sound-btn { background: rgba(255,255,255,0.1); border: none; color: white; padding: 10px; border-radius: 12px; font-size: 20px; cursor: pointer; }
        
        #score-container { margin-top: 20px; }
        #score { font-size: 60px; color: #ffffff; text-shadow: 0 0 20px #64b5f6; font-weight: 800; }
        .currency { font-size: 24px; color: #64b5f6; margin-left: 10px; }
        
        .game-area { flex-grow: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        
        #wolf-container {
            width: 280px; height: 280px; border-radius: 50%;
            background-image: url('https://raw.githubusercontent.com/Marko2512/Wolf-cliker/main/1774235761232.png');
            background-size: cover; background-position: center;
            box-shadow: 0 0 40px rgba(100, 181, 246, 0.4);
            border: 4px solid #64b5f6; transition: transform 0.05s;
            cursor: pointer; -webkit-tap-highlight-color: transparent; z-index: 2;
        }

        #save-btn { 
            background: #26a69a; color: white; border: none; 
            padding: 20px; width: 85%; border-radius: 20px; 
            font-size: 22px; margin-bottom: 40px; align-self: center; font-weight: bold;
        }

        .tap-number {
            position: absolute; color: #64b5f6; font-size: 32px; font-weight: bold;
            pointer-events: none; animation: flyUp 0.6s ease-out forwards; z-index: 10;
        }

        @keyframes flyUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-120px); opacity: 0; }
        }
    </style>
</head>
<body>
    <div id="top-bar">
        <div></div> <button id="sound-btn">🔊</button>
    </div>

    <div id="score-container">
        <span id="score">0</span><span class="currency">WOLF</span>
    </div>
    
    <div class="game-area" id="game-area">
        <div id="wolf-container"></div>
    </div>
    
    <button id="save-btn">СОХРАНИТЬ РЕЗУЛЬТАТ</button>

    <script>
        const tg = window.Telegram.WebApp;
        const scoreDisplay = document.getElementById('score');
        const wolf = document.getElementById('wolf-container');
        const soundBtn = document.getElementById('sound-btn');
        
        let clicks = parseInt(new URLSearchParams(window.location.search).get('bal')) || 0;
        let isSoundOn = true;
        scoreDisplay.innerText = clicks;

        // Звук клика (короткий и четкий)
        const clickSound = new Audio('https://www.soundjay.com/buttons/button-16.mp3');

        soundBtn.onclick = () => {
            isSoundOn = !isSoundOn;
            soundBtn.innerText = isSoundOn ? '🔊' : '🔇';
        };

        function handleTap(e) {
            if(e) e.preventDefault();
            clicks++;
            scoreDisplay.innerText = clicks;
            
            if(isSoundOn) {
                clickSound.currentTime = 0;
                clickSound.play();
            }

            wolf.style.transform = "scale(0.95)";
            setTimeout(() => { wolf.style.transform = "scale(1)"; }, 50);

            const num = document.createElement('div');
            num.className = 'tap-number';
            num.innerText = '+1';
            
            let x, y;
            if (e.touches) {
                x = e.touches[0].clientX;
                y = e.touches[0].clientY;
            } else {
                x = e.clientX;
                y = e.clientY;
            }
            
            num.style.left = x + 'px';
            num.style.top = (y - 50) + 'px';
            document.body.appendChild(num);
            setTimeout(() => num.remove(), 600);
            
            if (window.navigator.vibrate) window.navigator.vibrate(10);
        }

        wolf.addEventListener('touchstart', handleTap);
        wolf.addEventListener('click', handleTap);

        document.getElementById('save-btn').onclick = () => {
            tg.sendData(JSON.stringify({ clicks: clicks }));
            tg.close();
        };

        tg.expand();
    </script>
</body>
</html>
