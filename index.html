<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            background: #0e1621; color: white; text-align: center; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            margin: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh; 
        }
        #score { font-size: 60px; font-weight: bold; margin-top: 30px; color: #64b5f6; text-shadow: 0 0 15px rgba(100,181,246,0.5); }
        .game-area { flex-grow: 1; display: flex; align-items: center; justify-content: center; }
        #wolf { 
            width: 260px; height: 260px; border-radius: 50%; 
            border: 6px solid #64b5f6; 
            background: url('https://raw.githubusercontent.com/Marko2512/Wolf-cliker/main/1774235761232.png') center/cover;
            box-shadow: 0 0 30px rgba(100,181,246,0.3);
            transition: transform 0.05s;
            cursor: pointer;
        }
        #wolf:active { transform: scale(0.92); }
        
        .footer { padding-bottom: 30px; } /* Отступ снизу */
        #en-text { font-size: 18px; margin-bottom: 8px; font-weight: bold; }
        #energy-bar { width: 80%; background: #222; height: 14px; border-radius: 10px; margin: 0 auto 25px; border: 1px solid #444; overflow: hidden; }
        #fill { background: linear-gradient(90deg, #64b5f6, #2196f3); height: 100%; width: 100%; transition: 0.3s; }
        
        #save-btn { 
            background: #26a69a; border: none; color: white; 
            padding: 18px 0; width: 85%; border-radius: 20px; 
            font-size: 20px; font-weight: bold; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body>
    <div id="score">0</div>
    <div class="game-area"><div id="wolf"></div></div>
    
    <div class="footer">
        <div id="en-text">⚡ 2500 / 2500</div>
        <div id="energy-bar"><div id="fill"></div></div>
        <button id="save-btn">СОХРАНИТЬ И ВЫЙТИ</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const p = new URLSearchParams(window.location.search);
        let clicks = parseInt(p.get('bal')) || 0, energy = parseInt(p.get('en')) || 2500;
        
        function up() {
            document.getElementById('score').innerText = clicks;
            document.getElementById('en-text').innerText = `⚡ ${energy} / 2500`;
            document.getElementById('fill').style.width = (energy / 2500 * 100) + '%';
        }
        
        setInterval(() => { if(energy < 2500) { energy++; up(); } }, 2000);
        
        function tap(e) { 
            e.preventDefault();
            if(energy > 0) { clicks++; energy--; up(); } 
        }
        
        const wolf = document.getElementById('wolf');
        wolf.addEventListener('touchstart', tap);
        wolf.addEventListener('mousedown', tap);

        document.getElementById('save-btn').onclick = () => {
            tg.sendData(JSON.stringify({ clicks: clicks, energy: energy }));
            setTimeout(() => tg.close(), 100);
        };
        
        up(); tg.expand();
    </script>
</body>
</html>
