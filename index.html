<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0e1621; color: white; font-family: sans-serif; text-align: center; margin: 0; overflow: hidden; user-select: none; }
        .score-container { margin-top: 40px; font-size: 55px; font-weight: bold; color: #3498db; }
        .wolf-btn { 
            width: 250px; height: 250px; border-radius: 50%; 
            background: url('1774235761232.png') center/cover;
            border: 6px solid #3498db; margin: 40px auto; cursor: pointer;
            box-shadow: 0 0 25px rgba(52, 152, 219, 0.6); transition: transform 0.05s;
        }
        .wolf-btn:active { transform: scale(0.93); }
        .save-btn {
            background: #27ae60; color: white; border: none; padding: 18px 40px;
            font-size: 20px; border-radius: 12px; cursor: pointer; font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <div class="score-container">💰 <span id="score">0</span></div>
    <div class="wolf-btn" id="btn"></div>
    
    <button class="save-btn" onclick="finishGame()">СОХРАНИТЬ И ВЫЙТИ</button>

    <script>
        let tg = window.Telegram.WebApp;
        let score = parseInt(localStorage.getItem('wolf_score')) || 0;
        tg.expand();
        document.getElementById('score').innerText = score;

        // Клик по волку
        document.getElementById('btn').addEventListener('touchstart', (e) => {
            e.preventDefault();
            score++;
            document.getElementById('score').innerText = score;
            localStorage.setItem('wolf_score', score);
        });

        // Функция сохранения и ЖЕСТКОГО выхода
        function finishGame() {
            if (score > 0) {
                tg.sendData(JSON.stringify({clicks: score}));
            }
            // Закрываем приложение через небольшую паузу
            setTimeout(() => {
                tg.close();
            }, 150);
        }
    </script>
</body>
</html>
