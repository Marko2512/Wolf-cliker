<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wolf Marko Clicker</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0e1621; color: white; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; overflow: hidden; user-select: none; }
        .header { margin-top: 20px; color: #3498db; font-weight: bold; font-size: 22px; text-transform: uppercase; letter-spacing: 2px; }
        .score-container { font-size: 54px; margin: 15px 0; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .coin-icon { width: 45px; margin-right: 12px; }
        .wolf-btn { 
            width: 280px; height: 280px; border-radius: 50%; 
            background: url('https://i.ibb.co/Xz95mPZ/wolf-icon.png') center/cover;
            border: 6px solid #3498db; box-shadow: 0 0 35px rgba(52, 152, 219, 0.6);
            margin: 25px auto; cursor: pointer; transition: transform 0.05s;
            -webkit-tap-highlight-color: transparent;
        }
        .wolf-btn:active { transform: scale(0.92); }
        .energy-bar { width: 85%; height: 14px; background: #1c2733; margin: 20px auto; border-radius: 7px; border: 1px solid #34495e; overflow: hidden; }
        .energy-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #3498db, #2ecc71); transition: width 0.2s; }
        .stats { font-size: 18px; color: #bdc3c7; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="header">WOLF MARKO CLICKER</div>
    <div class="score-container">
        <img src="https://cdn-icons-png.flaticon.com/512/2933/2933116.png" class="coin-icon">
        <span id="score">0</span>
    </div>
    
    <div class="wolf-btn" id="clickBtn"></div>
    
    <div class="energy-bar"><div class="energy-fill" id="energyFill"></div></div>
    <div class="stats">⚡ Энергия: <span id="energy">1000</span>/1000</div>

    <script>
        let tg = window.Telegram.WebApp;
        let score = parseInt(localStorage.getItem('wolf_score')) || 0;
        let energy = parseInt(localStorage.getItem('wolf_energy')) || 1000;
        
        tg.expand();
        tg.headerColor = '#0e1621';

        const scoreEl = document.getElementById('score');
        const energyEl = document.getElementById('energy');
        const energyFill = document.getElementById('energyFill');

        function updateDisplay() {
            scoreEl.innerText = score;
            energyEl.innerText = energy;
            energyFill.style.width = (energy / 10) + '%';
            localStorage.setItem('wolf_score', score);
            localStorage.setItem('wolf_energy', energy);
        }

        document.getElementById('clickBtn').addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (energy > 0) {
                score++;
                energy--;
                updateDisplay();
                if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            }
        });

        setInterval(() => {
            if (energy < 1000) {
                energy = Math.min(1000, energy + 1);
                updateDisplay();
            }
        }, 1200);

        updateDisplay();
    </script>
</body>
</html>
