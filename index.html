<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0b0e11; color: #fff; font-family: sans-serif; text-align: center; margin: 0; overflow: hidden; user-select: none; }
        .header { margin-top: 20px; font-size: 22px; color: #0088cc; font-weight: bold; }
        .balance { font-size: 48px; margin: 15px 0; font-weight: 900; }
        .wolf-btn { width: 240px; height: 240px; border-radius: 50%; border: 6px solid #1c232d;
                    background: url('https://i.ibb.co/vz44444/wolf-logo.jpg') center/cover;
                    margin: 20px auto; cursor: pointer; transition: transform 0.05s;
                    box-shadow: 0 0 20px rgba(0, 136, 204, 0.2); }
        .wolf-btn:active { transform: scale(0.92); }
        .energy-bar { width: 80%; height: 12px; background: #1c232d; margin: 30px auto; border-radius: 10px; }
        .energy-fill { width: 100%; height: 100%; background: #0088cc; border-radius: 10px; transition: 0.2s; }
    </style>
</head>
<body>
    <div class="header">WOLF MARKO CLICKER</div>
    <div class="balance">💰 <span id="bal">0</span></div>
    <div class="wolf-btn" onclick="tap()"></div>
    <div class="energy-bar"><div id="fill" class="energy-fill"></div></div>
    <div>⚡️ Овцы: <span id="en">1000</span>/1000</div>

    <script>
        let tg = window.Telegram.WebApp;
        let b = 0, e = 1000;
        tg.expand();
        function tap() {
            if (e >= 10) {
                b += 1; e -= 10;
                document.getElementById('bal').innerText = b;
                document.getElementById('en').innerText = e;
                document.getElementById('fill').style.width = (e/10) + "%";
                tg.HapticFeedback.impactOccurred('medium');
            }
        }
        setInterval(() => { if(e < 1000) { e += 2; document.getElementById('en').innerText = e; document.getElementById('fill').style.width = (e/10) + "%"; } }, 1000);
    </script>
</body>
</html>
