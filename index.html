<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: radial-gradient(circle, #1b2838 0%, #0e1621 100%); color: white; text-align: center; margin: 0; padding: 0; font-family: sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        #mining-info { background: rgba(100, 181, 246, 0.1); padding: 10px; font-size: 14px; color: #64b5f6; }
        #score { font-size: 60px; color: #ffffff; text-shadow: 0 0 20px #64b5f6; font-weight: 800; margin-top: 20px; }
        .currency { font-size: 20px; color: #64b5f6; }
        .game-area { flex-grow: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        #wolf-container { width: 270px; height: 270px; border-radius: 50%; background-image: url('https://raw.githubusercontent.com/Marko2512/Wolf-cliker/main/1774235761232.png'); background-size: cover; background-position: center; box-shadow: 0 0 50px rgba(100, 181, 246, 0.4); border: 4px solid #64b5f6; transition: transform 0.05s; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        #save-btn { background: #26a69a; color: white; border: none; padding: 20px; width: 85%; border-radius: 20px; font-size: 20px; margin-bottom: 30px; align-self: center; font-weight: bold; }
        .tap-number { position: absolute; color: #64b5f6; font-size: 32px; font-weight: bold; pointer-events: none; animation: flyUp 0.6s ease-out forwards; }
        @keyframes flyUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-130px); opacity: 0; } }
    </style>
</head>
<body>
    <div id="mining-info">⛏ ВОЛКИ ДОБЫВАЮТ: 1 WOLF / МИН</div>
    <div id="score-container">
        <span id="score">0</span> <span class="currency">WOLF</span>
    </div>
    <div class="game-area"><div id="wolf-container"></div></div>
    <button id="save-btn">СОХРАНИТЬ И ВЫЙТИ</button>

    <script>
        const tg = window.Telegram.WebApp;
        const scoreDisplay = document.getElementById('score');
        const wolf = document.getElementById('wolf-container');
        let clicks = parseInt(new URLSearchParams(window.location.search).get('bal')) || 0;
        scoreDisplay.innerText = clicks;

        function handleTap(e) {
            if(e) e.preventDefault();
            clicks++;
            scoreDisplay.innerText = clicks;
            wolf.style.transform = "scale(0.95)";
            setTimeout(() => { wolf.style.transform = "scale(1)"; }, 50);

            const num = document.createElement('div');
            num.className = 'tap-number';
            num.innerText = '+1';
            let x = e.touches ? e.touches[0].clientX : e.clientX;
            let y = e.touches ? e.touches[0].clientY : e.clientY;
            num.style.left = x + 'px'; num.style.top = (y - 50) + 'px';
            document.body.appendChild(num);
            setTimeout(() => num.remove(), 600);
            if (window.navigator.vibrate) window.navigator.vibrate(10);
        }

        wolf.addEventListener('touchstart', handleTap);
        wolf.addEventListener('mousedown', handleTap);
        document.getElementById('save-btn').onclick = () => {
            tg.sendData(JSON.stringify({ clicks: clicks }));
            tg.close();
        };
        tg.expand();
    </script>
</body>
</html>
