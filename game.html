<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0b1016; color: white; text-align: center; font-family: sans-serif; margin: 0; }
        #balance { font-size: 60px; font-weight: bold; color: #5da9f6; margin-top: 30px; }
        .energy { color: #f1c40f; font-size: 18px; margin-bottom: 20px; }
        .wolf-btn { width: 250px; height: 250px; border-radius: 50%; background: url('https://marko2512.github.io/Wolf-cliker/1774235761232.png') center/cover; box-shadow: 0 0 30px #4eb5f1; cursor: pointer; border: none; outline: none; transition: 0.1s; }
        .wolf-btn:active { transform: scale(0.95); }
        .save-btn { margin-top: 30px; padding: 15px 30px; background: #27ae60; border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div id="balance">0</div>
    <div class="energy">⚡ <span id="en-val">2500</span></div>
    <button class="wolf-btn" onclick="tap()"></button>
    <br>
    <button class="save-btn" onclick="saveData()">💾 СОХРАНИТЬ И ВЫЙТИ</button>

    <script>
        const tg = window.Telegram.WebApp;
        const params = new URLSearchParams(window.location.search);
        let bal = parseInt(params.get('bal')) || 0;
        let en = parseInt(params.get('en')) || 2500;

        function updateUI() {
            document.getElementById('balance').innerText = bal;
            document.getElementById('en-val').innerText = en;
        }

        function tap() {
            if (en > 0) { 
                bal++; en--; updateUI(); 
                tg.HapticFeedback.impactOccurred('light'); 
            }
        }

        function saveData() {
            // ОТПРАВКА ДАННЫХ БОТУ
            tg.sendData(JSON.stringify({bal: bal, en: en}));
            tg.close();
        }

        updateUI();
        tg.expand();
    </script>
</body>
</html>
