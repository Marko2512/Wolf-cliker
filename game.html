<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { -webkit-tap-highlight-color: transparent; user-select: none; outline: none; }
        body { background: #0b1016; color: white; text-align: center; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #balance { font-size: 80px; font-weight: bold; color: #5da9f6; margin-top: 50px; }
        .energy { color: #f1c40f; font-size: 20px; margin: 10px 0; }
        .click-area { flex: 1; display: flex; align-items: center; justify-content: center; }
        .wolf-btn { width: 280px; height: 280px; border-radius: 50%; background: url('https://marko2512.github.io/Wolf-cliker/1774235761232.png') center/cover; box-shadow: 0 0 40px #4eb5f1; cursor: pointer; transition: 0.1s; border: none; }
        .wolf-btn:active { transform: scale(0.92); }
        .nav { position: fixed; bottom: 0; width: 100%; height: 85px; background: #131d27; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #23313f; }
        .nav-item { color: #5da9f6; font-size: 12px; font-weight: bold; cursor: pointer; text-decoration: none; }
    </style>
</head>
<body>
    <div id="balance">0</div>
    <div class="energy">⚡ <span id="en-val">2500</span></div>
    
    <div class="click-area">
        <div class="wolf-btn" onclick="tap()"></div>
    </div>

    <div class="nav">
        <div class="nav-item" onclick="getBonus()">🎁 БОНУС</div>
        <div class="nav-item" onclick="copyRef()">👥 РЕФЫ</div>
        <div class="nav-item" onclick="showTop()">🏆 ТОП</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const params = new URLSearchParams(window.location.search);
        let bal = parseInt(params.get('bal')) || 0;
        let en = parseInt(params.get('en')) || 2500;
        const uid = params.get('uid');

        function updateUI() {
            document.getElementById('balance').innerText = bal;
            document.getElementById('en-val').innerText = en;
        }

        function tap() {
            if (en > 0) { 
                bal++; en--; updateUI(); 
                tg.HapticFeedback.impactOccurred('light'); 
                if (bal % 10 === 0) save(); // Сохраняем каждые 10 кликов
            }
        }

        function save() {
            tg.sendData(JSON.stringify({bal: bal, en: en}));
        }

        function copyRef() {
            const link = "https://t.me/WolfMany_bot?start=" + uid;
            const el = document.createElement('textarea');
            el.value = link; document.body.appendChild(el);
            el.select(); document.execCommand('copy');
            document.body.removeChild(el);
            tg.showAlert("Ссылка скопирована!\n" + link);
        }

        function showTop() {
            tg.showAlert("🏆 ТОП ИГРОКОВ:\n1. Marko: 50000\n2. Wolf: 25000\n3. Ты: " + bal);
        }

        function getBonus() {
            bal += 500; updateUI(); save();
            tg.showAlert("Бонус +500 начислен!");
        }

        setInterval(() => { if (en < 2500) { en++; updateUI(); } }, 1000);
        updateUI(); tg.expand();
    </script>
</body>
</html>
