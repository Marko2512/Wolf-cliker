<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { -webkit-tap-highlight-color: transparent; outline: none; box-sizing: border-box; }
        body { background: #0b1016; color: white; text-align: center; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #balance { font-size: 60px; font-weight: bold; color: #5da9f6; margin-top: 20px; }
        .energy { color: #f1c40f; font-size: 18px; margin-bottom: 20px; }
        .click-zone { flex: 1; display: flex; align-items: center; justify-content: center; }
        .wolf-btn { width: 260px; height: 260px; border-radius: 50%; background: url('https://marko2512.github.io/Wolf-cliker/1774235761232.png') center/cover; box-shadow: 0 0 40px #4eb5f1; cursor: pointer; transition: 0.1s; border: 5px solid #131d27; }
        .wolf-btn:active { transform: scale(0.92); }
        .save-btn { background: #27ae60; color: white; border: none; padding: 12px 25px; border-radius: 12px; font-weight: bold; cursor: pointer; margin-bottom: 100px; }
    </style>
</head>
<body>
    <div id="balance">0</div>
    <div class="energy">⚡ <span id="en-val">2500</span></div>
    <div class="click-zone"><div class="wolf-btn" onclick="tap()"></div></div>
    <button class="save-btn" onclick="saveAndExit()">💾 СОХРАНИТЬ И ВЫЙТИ</button>

    <script>
        const tg = window.Telegram.WebApp;
        const params = new URLSearchParams(window.location.search);
        
        let totalBal = parseInt(params.get('bal')) || 0; // То, что уже есть в базе
        let sessionTaps = 0; // То, что натапали сейчас
        let en = parseInt(params.get('en')) || 2500;

        function updateUI() {
            document.getElementById('balance').innerText = (totalBal + sessionTaps).toLocaleString();
            document.getElementById('en-val').innerText = en;
        }

        function tap() {
            if (en > 0) { 
                sessionTaps++; 
                en--; 
                updateUI(); 
                tg.HapticFeedback.impactOccurred('light'); 
            }
        }

        function saveAndExit() {
            // Отправляем общую сумму (старое + новое)
            tg.sendData(JSON.stringify({bal: (totalBal + sessionTaps), en: en}));
            setTimeout(() => { tg.close(); }, 150);
        }

        // Автосохранение каждые 10 сек
        setInterval(() => {
            tg.sendData(JSON.stringify({bal: (totalBal + sessionTaps), en: en}));
        }, 10000);

        setInterval(() => { if (en < 2500) { en++; updateUI(); } }, 2000);
        updateUI();
        tg.expand();
    </script>
</body>
</html>
