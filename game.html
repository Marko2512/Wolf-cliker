<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { -webkit-tap-highlight-color: transparent; outline: none; box-sizing: border-box; touch-action: none; }
        body { 
            background: #0b1016; color: white; text-align: center; font-family: sans-serif; 
            margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; 
            user-select: none; -webkit-user-select: none;
        }
        
        #balance { font-size: 50px; font-weight: bold; color: #5da9f6; margin-top: 30px; text-shadow: 0 0 20px rgba(93, 169, 246, 0.4); }
        .energy { color: #f1c40f; font-size: 20px; margin-top: 10px; font-weight: bold; }

        .click-area { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        
        .wolf-btn { 
            width: 280px; height: 280px; border-radius: 50%; 
            background: url('https://marko2512.github.io/Wolf-cliker/1774235761232.png') center/cover; 
            box-shadow: 0 0 60px rgba(78, 181, 241, 0.6); 
            border: 8px solid #131d27; transition: transform 0.05s;
        }
        .wolf-btn:active { transform: scale(0.96); }

        .tap-anim {
            position: absolute; color: #5da9f6; font-size: 32px; font-weight: bold;
            pointer-events: none; animation: moveUp 0.8s ease-out forwards; z-index: 100;
        }
        @keyframes moveUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-120px); } }

        .btn-save { 
            background: linear-gradient(135deg, #27ae60, #2ecc71); color: white; border: none; 
            padding: 18px 40px; border-radius: 18px; font-weight: bold; font-size: 18px;
            margin-bottom: 110px; cursor: pointer; box-shadow: 0 5px 20px rgba(0,0,0,0.4);
        }

        .nav { position: fixed; bottom: 0; width: 100%; height: 90px; background: #131d27; display: flex; justify-content: space-around; align-items: center; border-top: 2px solid #23313f; padding-bottom: 15px; }
        .nav-item { color: #5da9f6; font-size: 11px; font-weight: bold; display: flex; flex-direction: column; align-items: center; gap: 6px; flex: 1; cursor: pointer; }
        .nav-item i { font-style: normal; font-size: 28px; }
    </style>
</head>
<body>
    <div id="balance">0</div>
    <div class="energy">⚡ <span id="en-val">2500</span></div>
    
    <div class="click-area">
        <div class="wolf-btn" id="wolf-target"></div>
    </div>

    <button class="btn-save" onclick="saveAndExit()">💾 СОХРАНИТЬ И ВЫЙТИ</button>

    <div class="nav">
        <div class="nav-item" onclick="getBonus()"><i>🎁</i><span>БОНУС</span></div>
        <div class="nav-item" onclick="copyRef()"><i>👥</i><span>РЕФЫ</span></div>
        <div class="nav-item" onclick="showTop()"><i>🏆</i><span>ТОП</span></div>
        <div class="nav-item" onclick="showProfile()"><i>👤</i><span>ПРОФИЛЬ</span></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const params = new URLSearchParams(window.location.search);
        
        let dbBal = parseInt(params.get('bal')) || 0; 
        let sessionTaps = 0; 
        let en = parseInt(params.get('en')) || 2500;
        const uid = params.get('uid');

        function updateUI() {
            document.getElementById('balance').innerText = (dbBal + sessionTaps).toLocaleString();
            document.getElementById('en-val').innerText = en;
        }

        const wolfTarget = document.getElementById('wolf-target');

        wolfTarget.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touches = e.changedTouches;
            for (let i = 0; i < touches.length; i++) {
                if (en > 0) {
                    sessionTaps++;
                    en--;
                    createTapAnim(touches[i].pageX, touches[i].pageY);
                    tg.HapticFeedback.impactOccurred('medium');
                }
            }
            updateUI();
        }, {passive: false});

        function createTapAnim(x, y) {
            const el = document.createElement('div');
            el.className = 'tap-anim';
            el.innerText = '+1';
            el.style.left = x + 'px';
            el.style.top = (y - 50) + 'px';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 800);
        }

        function copyRef() {
            const link = "https://t.me/WolfMany_bot?start=" + uid;
            const temp = document.createElement('textarea');
            temp.value = link;
            document.body.appendChild(temp);
            temp.select();
            document.execCommand('copy');
            document.body.removeChild(temp);
            tg.showAlert("✅ Ссылка для друзей скопирована!");
            tg.HapticFeedback.notificationOccurred('success');
        }

        function saveAndExit() {
            tg.sendData(JSON.stringify({ bal: (dbBal + sessionTaps), en: en }));
            setTimeout(() => tg.close(), 250);
        }

        function getBonus() {
            const now = Date.now();
            const last = localStorage.getItem('bonus_' + uid);
            if (!last || (now - last > 86400000)) {
                sessionTaps += 1000;
                localStorage.setItem('bonus_' + uid, now);
                updateUI();
                tg.showAlert("🎁 Твой ежедневный бонус +1000 монет получен!");
            } else { tg.showAlert("Заходи завтра за новым подарком!"); }
        }

        function showTop() { 
            tg.showAlert("🏆 ТОП ЛИДЕРОВ\n\n1. WolfMarko: 1,500,000\n2. Ты: " + (dbBal + sessionTaps)); 
        }

        function showProfile() { 
            tg.showAlert("👤 ПРОФИЛЬ\n\nВаш ID: " + uid + "\nВсего монет: " + (dbBal + sessionTaps)); 
        }

        setInterval(() => { if (en < 2500) { en++; updateUI(); } }, 2000);

        updateUI();
        tg.expand();
    </script>
</body>
</html>
