<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { 
            -webkit-tap-highlight-color: transparent; 
            outline: none; 
            box-sizing: border-box; 
            touch-action: manipulation;
        }
        body { 
            background: #0b1016; 
            color: white; 
            text-align: center; 
            font-family: sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden; 
            user-select: none;
            -webkit-user-select: none;
        }
        
        #balance { font-size: 55px; font-weight: bold; color: #5da9f6; margin-top: 20px; text-shadow: 0 0 15px rgba(93, 169, 246, 0.5); }
        .energy { color: #f1c40f; font-size: 18px; margin-bottom: 20px; font-weight: bold; }

        .click-zone { flex: 1; display: flex; align-items: center; justify-content: center; }
        
        /* Кнопка с защитой от жестов браузера */
        .wolf-btn { 
            width: 270px; 
            height: 270px; 
            border-radius: 50%; 
            background: url('https://marko2512.github.io/Wolf-cliker/1774235761232.png') center/cover; 
            box-shadow: 0 0 50px #4eb5f1; 
            cursor: pointer; 
            transition: transform 0.05s; 
            border: 6px solid #131d27;
            touch-action: none; 
        }
        .wolf-btn:active { transform: scale(0.95); }

        .save-btn { 
            background: linear-gradient(135deg, #27ae60, #2ecc71); 
            color: white; 
            border: none; 
            padding: 16px 35px; 
            border-radius: 15px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-bottom: 100px; 
            font-size: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        /* Нижнее меню */
        .nav { position: fixed; bottom: 0; width: 100%; height: 85px; background: #131d27; display: flex; justify-content: space-around; align-items: center; border-top: 2px solid #23313f; padding-bottom: 10px; }
        .nav-item { color: #5da9f6; font-size: 10px; font-weight: bold; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .nav-item span:first-child { font-size: 26px; }
    </style>
</head>
<body>
    <div id="balance">0</div>
    <div class="energy">⚡ <span id="en-val">2500</span></div>
    
    <div class="click-zone">
        <div class="wolf-btn" id="target"></div>
    </div>

    <button class="save-btn" onclick="saveAndExit()">💾 СОХРАНИТЬ И ВЫЙТИ</button>

    <div class="nav">
        <div class="nav-item" onclick="getBonus()"><span>🎁</span><span>БОНУС</span></div>
        <div class="nav-item" onclick="copyRef()"><span>👥</span><span>РЕФЫ</span></div>
        <div class="nav-item" onclick="showTop()"><span>🏆</span><span>ТОП</span></div>
        <div class="nav-item" onclick="showProfile()"><span>👤</span><span>ПРОФИЛЬ</span></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const params = new URLSearchParams(window.location.search);
        
        let dbBal = parseInt(params.get('bal')) || 0; 
        let sessionTaps = 0; 
        let en = parseInt(params.get('en')) || 2500;
        const uid = params.get('uid');

        function updateUI() {
            document.getElementById('balance').innerText = (dbBal + sessionTaps).toLocaleString();
            document.getElementById('en-val').innerText = en;
        }

        const btn = document.getElementById('target');

        // ПОДДЕРЖКА МУЛЬТИТАЧА (3 ПАЛЬЦА И БОЛЬШЕ)
        btn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            // Считаем каждое касание пальца отдельно
            const touches = e.changedTouches;
            for (let i = 0; i < touches.length; i++) {
                if (en > 0) {
                    sessionTaps++;
                    en--;
                    tg.HapticFeedback.impactOccurred('light');
                }
            }
            updateUI();
        }, {passive: false});

        function syncData() {
            tg.sendData(JSON.stringify({
                bal: (dbBal + sessionTaps), 
                en: en
            }));
        }

        function saveAndExit() {
            syncData();
            setTimeout(() => { tg.close(); }, 250);
        }

        // Автосохранение
        setInterval(syncData, 15000);

        // Реген энергии
        setInterval(() => { if (en < 2500) { en++; updateUI(); } }, 2000);

        function getBonus() {
            const now = Date.now();
            const last = localStorage.getItem('wolf_bonus_' + uid);
            if (!last || (now - last > 86400000)) {
                sessionTaps += 1000; 
                localStorage.setItem('wolf_bonus_' + uid, now);
                updateUI(); 
                tg.showAlert("🎁 Бонус +1000 монет получен!");
            } else { 
                tg.showAlert("Заходи за бонусом завтра!"); 
            }
        }

        function copyRef() {
            tg.showAlert("Ссылка для друзей:\nhttps://t.me/WolfMany_bot?start=" + uid);
        }

        function showTop() {
            tg.showAlert("🏆 ТОП ЛИДЕРОВ\n1. Wolf Marko: 5M\n2. Ты: " + (dbBal + sessionTaps));
        }

        function showProfile() {
            tg.showAlert("👤 ПРОФИЛЬ\nID: " + uid + "\nВсего монет: " + (dbBal + sessionTaps));
        }

        updateUI();
        tg.expand();
    </script>
</body>
</html>
