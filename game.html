<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0e1621; color: white; text-align: center; font-family: sans-serif; margin: 0; padding: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        #score { font-size: 60px; font-weight: bold; margin-top: 30px; color: #64b5f6; }
        .game-area { flex-grow: 1; display: flex; align-items: center; justify-content: center; }
        #wolf { width: 220px; height: 220px; border-radius: 50%; border: 6px solid #64b5f6; background: url('https://raw.githubusercontent.com/Marko2512/Wolf-cliker/main/1774235761232.png') center/cover; }
        .bottom-menu { width: 100%; background: #17212b; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #2b3b4d; padding-bottom: 30px; }
        .menu-item { background: none; border: none; color: #8ab4f8; font-size: 11px; font-weight: bold; display: flex; flex-direction: column; align-items: center; }
        #energy-bar { width: 85%; background: #222; height: 10px; border-radius: 10px; margin: 5px auto; overflow: hidden; }
        #fill { background: #64b5f6; height: 100%; width: 100%; }
    </style>
</head>
<body>
    <div id="score">0</div>
    <div class="game-area"><div id="wolf"></div></div>
    <div>⚡ <span id="en-num">2500</span> / 2500</div>
    <div id="energy-bar"><div id="fill"></div></div>
    <div class="bottom-menu">
        <button class="menu-item" onclick="bonus()">🎁 БОНУС</button>
        <button class="menu-item" onclick="save()">💾 СЕЙВ</button>
        <button class="menu-item" onclick="showTop()">🏆 ТОП</button>
    </div>
    <script>
        const tg = window.Telegram.WebApp;
        const p = new URLSearchParams(window.location.search);
        let bal = parseInt(p.get('bal')) || 0, en = parseInt(p.get('en')) || 2500;
        let top = JSON.parse(decodeURIComponent(p.get('top') || "[]"));

        function up() {
            document.getElementById('score').innerText = bal;
            document.getElementById('en-num').innerText = en;
            document.getElementById('fill').style.width = (en/2500*100)+'%';
        }
        function bonus() {
            if(!localStorage.getItem('b')) { bal+=500; localStorage.setItem('b', Date.now()); up(); alert('+500!'); }
            else { alert('Уже брал!'); }
        }
        function showTop() { alert("ТОП:\n"+top.map(u => u[0]+": "+u[1]).join("\n")); }
        document.getElementById('wolf').onclick = () => { if(en>0) { bal++; en--; up(); } };
        function save() { tg.sendData(JSON.stringify({bal, en})); tg.close(); }
        up(); tg.expand();
    </script>
</body>
</html>
